<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greenkart Private Limited | Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1606788075764-2a68c47c1e77?auto=format&fit=crop&w=1950&q=80') no-repeat center center/cover;
      color: #fff;
      text-align: center;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.5);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .container {
      z-index: 1;
      max-width: 600px;
      padding: 50px 30px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    h1 { font-size: 3rem; margin-bottom: 20px; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
    p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 30px; }

    .subscription input {
      padding: 12px 18px;
      border-radius: 30px 0 0 30px;
      border: none;
      outline: none;
      width: 250px;
    }
    .subscription button {
      padding: 12px 25px;
      border-radius: 0 30px 30px 0;
      border: none;
      background: #27ae60;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .subscription button:hover { background: #2ecc71; }

    .info { margin-top: 30px; font-size: 0.95rem; }
    .info a { color: #ffffff; text-decoration: underline; }

    footer { margin-top: 30px; font-size: 0.85rem; opacity: 0.85; }
  </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
  <h1>We are Coming Soon 🌱</h1>
  <p>Our website is under preparation. Something fresh and exciting is on the way!</p>

  <div class="subscription">
    <input type="email" placeholder="Enter your email" />
    <button>Notify Me</button>
  </div>

  <div class="info">
    <p><strong>Address:</strong><br>No. 346/8 A, Mahawatta Road, Arawwala, Pannipitiya</p>
    <p><strong>Email:</strong> <a href="mailto:hello@greenkartz.com">hello@greenkartz.com</a></p>
  </div>

  <footer>© 2025 Greenkart Private Limited. All rights reserved.</footer>
</div>

</body>
</html>
